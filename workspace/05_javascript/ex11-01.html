<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    /*
    배열 생성, 읽기, 쓰기
    */

    // 배열 생성 방법 1: Array 생성자 사용
    //const arr = new Array(100, 200, 300);

    // 배열 생성 방법 2: JSON 표기법
    const arr = [100, 200, 300];

    // 배열에 요소 추가
    // index 사용
    arr[3] = 400;
    arr[4] = 500;

    // push 메서드 사용: 배열의 마지막 위치에 지정한 요소를 추가
    arr.push(600);
    arr.push(700);
    arr.push(800);

    // index를 이용해서 배열의 마지막 위치에 요소를 추가
    arr[arr.length] = 900;
    arr[arr.length] = 1100;
    arr[arr.length] = 1000;
    arr[arr.length] = 2000;

    // 첫번째 위치에 요소 추가
    arr.unshift(0);
    arr.unshift(50);

    console.log('first elem', arr.shift());
    console.log('last elem', arr.pop());
    // 기존 요소의 값을 변경
    let temp = arr[arr.length];
    arr[arr.length] = arr[arr.length - 1];
    arr[arr.length - 1] = temp;


    // 배열의 모든 요소를 순차적으로 출력
    for(let i = 0; i < arr.length; i++){
      console.log(arr[i]);
    }

    // 배열의 모든 요소를 역순으로 출력


  </script>
</head>
<body>
  <h1>11-01 배열 생성, 읽기, 쓰기</h1>
</body>
</html>
