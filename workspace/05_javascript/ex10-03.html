<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <script>
    /*
    객체 리터럴로 객체 생성
    */

    // 객체 리터럴로 haru 객체 생성과 함께 속성 추가
    const haru = {
      name : 'haru',
      age : 6,
      hobby : 'sleep'
    };

    console.log(haru.name, haru.age, haru.hobby);
    console.log(haru);

    // 객체 리터럴로 namu 객체 생성과 함께 속성 추가
    const namu = {
      name : 'namu',
      age : 9,
      hobby : 'eat'
    };

    console.log(namu.name, namu.age, namu.hobby);
    console.log(namu);

    // 객체에 새로운 속성 추가(breed)
    haru.breed = 'italian greyhound';
    namu.breed = 'cavalier king charles spaniel';

    console.log(haru, namu);

    // 객체를 JSON 형태의 문자열로 변환    
    const haruStr = JSON.stringify(haru);
    console.log(haruStr.age);
    console.log(typeof haruStr, haruStr);

    // JSON 형태의 문자열을 객체로 변환
    const haruObj = JSon.parse(haru);
    console.log(haruObj.name);
    console.log(typeof haruObj, haruObj);

  </script>
</head>
<body>
  <h1>10-03 리터럴 방식으로 객체 생성</h1>
</body>
</html>
